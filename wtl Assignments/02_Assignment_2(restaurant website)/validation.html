<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Validation Page</title>
    <link rel="stylesheet" href="CSS/External.css" />
  </head>
  <body>
    <h1>Validation Demo</h1>

    <section>
      <h2>Login</h2>
      <form onsubmit="return validateLogin();">
        <label for="loginEmail">Email</label><br />
        <input
          type="email"
          id="loginEmail"
          name="loginEmail"
          required
        /><br /><br />

        <label for="loginPassword">Password</label><br />
        <input
          type="password"
          id="loginPassword"
          name="loginPassword"
          required
        /><br /><br />

        <button type="submit">Login</button>
      </form>
    </section>

    <hr />

    <section>
      <h2>Register</h2>
      <form onsubmit="return validateRegister();">
        <label for="regName">Name</label><br />
        <input type="text" id="regName" name="regName" required /><br /><br />

        <label for="regEmail">Email</label><br />
        <input
          type="email"
          id="regEmail"
          name="regEmail"
          required
        /><br /><br />

        <label for="regPassword">Password</label><br />
        <input
          type="password"
          id="regPassword"
          name="regPassword"
          required
        /><br /><br />

        <button type="submit">Register</button>
      </form>
    </section>

    <script src="validate.js"></script>
  </body>
</html>
